project:
  type: default
  render: 
    - "*.qmd"
engine: knitr
format:
  html:
    toc: false         # Disable Quarto's TOC generation
    minimal: true       # This is the "nuclear option" - it removes most Quarto/Bootstrap scaffolding
    theme: cosmo         # Keep this to avoid Bootstrap conflicts
    page-layout: full
    format-links: true
    css:
      - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css
      - https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css
      - /resources/mystyles.css
      - /resources/iconstyles.css
    include-in-header:
      - text: <script src="/resources/mathjax.js"></script>
      - text: <script src="/resources/rendernav.js" defer></script>
      - text: <script src="/resources/loadtoc.js" defer></script>
  typst:
    fontsize: 11pt
    keep-typ: true
    number-sections: false
    shift-heading-level-by: -1
    fig-format: pdf
    margin:
      x: 20mm          # left + right together
      top: 25mm
      bottom: 25mm
    include-in-header:
      - text: |
          #show figure: set block(breakable: true)
          #set enum(indent: 1em, body-indent: 0.75em, numbering: "[1]")
          #set list(indent: 1em, body-indent: 0.75em)
          #let color-link = rgb("#4f2fcd")
          #let color-ref = rgb("#1a1ad6")




